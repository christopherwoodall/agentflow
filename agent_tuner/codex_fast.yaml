name: codex_tuned
base_agent: codex
repo_url: https://github.com/openai/codex.git
default_branch: main
workdir_subpath: codex-rs
build_command: cargo build -p codex-cli
test_command: "true"  # teaching profile: skip tests to keep cycle fast
smoke_command: "{executable} --help >/dev/null"
executable_path: target/debug/codex
max_attempts: 3
env:
  AGENTFLOW_CODEX_SANDBOX_MODE: danger-full-access
evolution_prompt: |
  Evolve Codex using the copied traces from the selected Codex nodes.

  Primary objective:
  - Improve Codex behavior based on the failures, friction, and missed opportunities visible in those traces.

  Hidden grading signal:
  - The user's workspace contains a graded verifier report at `.agentflow/teach/verifier_report.txt`
    (and its structured JSON sibling `.agentflow/teach/verifier_report.json`). This report was produced
    by a hidden test suite the agent never saw. The candidate solution it grades lives at
    `.agentflow/teach/filter.py`. Read all three files before editing anything: the failing test cases
    show you exactly which behaviors need to improve. Treat the failure list as ground-truth signal,
    not as suggestions.

  Permission to specialize for documented failures (AGGRESSIVE MODE):
  - The verifier has already shown that abstract guidance ("handle obfuscation paths", "consider
    control characters", etc.) is INSUFFICIENT — the actor model reads such hints but does not
    operationalize them into the right code location. For this evolve, your specialization MUST be
    concrete enough that the downstream actor can read the prompt and produce a passing fix on its
    next attempt without further reasoning.
  - For EACH failing case named in the verifier report, your edit to the appropriate codex prompt
    MUST contain ALL THREE of the following, in this order:
      (a) The failing input quoted verbatim from the report (or a faithful escape thereof). Name
          the case explicitly so the actor can search for it.
      (b) A one-sentence diagnosis of WHERE in a typical implementation pipeline the bypass slips
          through (e.g. "null bytes inside a tag name defeat tag-level regex matches because the
          regex engine treats `\\x00` as a non-word character that breaks `<script` boundary").
      (c) A concrete, copy-pasteable fix snippet with explicit pipeline placement. Example shape:
              "BEFORE running any tag-level regex, normalize the raw input with:
                  text = text.replace('\\x00', '')  # strip null bytes that split tag names
              This must run on the RAW text once, before per-tag matching."
          The snippet must show the actual code transformation AND its pipeline position.
  - Treat the verifier report as a curriculum: one failing case → one concrete prompt addition
    that follows the (a)(b)(c) structure above. Generic editing-style improvements (e.g.
    "use apply_patch", "respect cwd boundaries") are NOT a substitute for the per-case fix.
  - PRIMARY placement: write your per-case additions into `codex-rs/agentflow_wrapper.md`
    (create the file if missing). Agentflow concatenates this file's content into the user
    prompt at prepare-time, so it ALWAYS reaches the model regardless of gateway-side
    system-prompt overrides. This is the only surface experimentally confirmed to steer
    runtime behavior when the user routes codex through a third-party gateway.
  - Secondary placement: you may also mirror the addition into `codex-rs/models-manager/prompt.md`
    (the baked-in `BASE_INSTRUCTIONS`). This helps in deployments without a gateway, but cannot
    be relied on alone.
  - Do not put per-case knowledge into personality or collaboration-mode templates where it is
    unlikely to fire.
  - This aggressive specialization permission overrides earlier "keep prompts generic" or
    "smallest coherent change" instincts for the duration of this evolve, and applies ONLY to
    failures explicitly listed in the verifier report.

  Explicitly allowed modifications:
  - System prompts, developer instructions, prompt templates, review prompts, collaboration-mode templates, and other instruction scaffolding.
  - Tool registration, tool availability, tool routing, tool defaults, tool descriptions, tool metadata, and related schemas or configuration.
  - Built-in agent roles, skills surfaced to the model, and agent orchestration behavior where it materially improves the traced workflows.
  - Use the `tunable_surfaces` mapping below as the file-level source of truth for where each adjustable surface is implemented.

  Constraints:
  - Prefer the smallest coherent set of changes that clearly addresses the traced issues.
  - Keep public interfaces and existing workflows stable unless the traces justify a behavior change.
  - Add or update tests near the edited code when behavior changes.
tunable_surfaces:
  # Verified surfaces: every path below either appears in an `include_str!` call
  # in codex-rs source, OR is read by agentflow itself at prepare-time.
  #
  # IMPORTANT: edits to `codex-rs/models-manager/prompt.md` were experimentally
  # confirmed to NOT reach the running model when the user routes codex via a
  # gateway proxy (the gateway overrides system prompt server-side). The first
  # surface below — `codex-rs/agentflow_wrapper.md` — is read by
  # `agentflow/agents/codex.py:_maybe_prepend_wrapper` and concatenated INTO
  # the user prompt before invocation, so its contents reach the model
  # regardless of any gateway-side prompt override. Prefer it for any change
  # that must visibly steer model behavior.
  - name: Agentflow-side prompt wrapper (PRIMARY SURFACE — ALWAYS REACHES MODEL)
    notes: |
      This file is read by agentflow at prepare-time and its content is
      prepended to the user prompt for every codex_tuned invocation
      (separator: a blank line, `---`, blank line). Because it joins the
      USER message — not a separate system message — it survives gateway
      proxies that overwrite system_instructions. CREATE this file if it
      does not exist yet; agentflow will pick it up automatically.

      Place high-leverage, behavior-shaping instructions here for the
      current task family. Each new entry should follow the same
      (a) failing case + verbatim input, (b) diagnosis, (c) concrete
      copy-pasteable code-level fix structure required by the
      Permission-to-specialize section above.
    paths:
      - codex-rs/agentflow_wrapper.md
  - name: Base coding-agent system prompt (SECONDARY — may be overridden by gateway)
    notes: |
      `BASE_INSTRUCTIONS` in models-manager. Loaded via `include_str!` in
      `codex-rs/models-manager/src/model_info.rs:16`. Only fires at runtime
      when the model provider's gateway respects client-sent system messages
      and the remote models manager does not return its own base_instructions.
      Edits here are documented as a fallback channel.
    paths:
      - codex-rs/models-manager/prompt.md
      - codex-rs/models-manager/src/model_info.rs
      - codex-rs/models-manager/models.json
  - name: apply_patch tool description and grammar
    notes: |
      `APPLY_PATCH_TOOL_INSTRUCTIONS` baked in via
      `codex-rs/apply-patch/src/lib.rs:34`. This is the only tool-description
      text the model sees for apply_patch, so edits here directly change how
      the model thinks about file edits.
    paths:
      - codex-rs/apply-patch/apply_patch_tool_instructions.md
      - codex-rs/apply-patch/src/lib.rs
      - codex-rs/core/src/tools/handlers/apply_patch.rs
      - codex-rs/core/src/tools/runtimes/apply_patch.rs
  - name: Collaboration-mode prompts (baked-in via include_str!)
    notes: |
      `codex-rs/collaboration-mode-templates/src/lib.rs` uses include_str! on
      these four files; they are the real source of the default / execute /
      pair-programming / plan collaboration instructions.
    paths:
      - codex-rs/collaboration-mode-templates/templates/default.md
      - codex-rs/collaboration-mode-templates/templates/execute.md
      - codex-rs/collaboration-mode-templates/templates/pair_programming.md
      - codex-rs/collaboration-mode-templates/templates/plan.md
      - codex-rs/collaboration-mode-templates/src/lib.rs
  - name: Review-mode prompt
    notes: |
      `core/review_prompt.md` is loaded via `include_str!` in
      `core/src/client_common.rs:19`. Only fires during review mode but is a
      real baked surface.
    paths:
      - codex-rs/core/review_prompt.md
      - codex-rs/core/src/client_common.rs
      - codex-rs/core/templates/review/exit_success.xml
      - codex-rs/core/templates/review/exit_interrupted.xml
  - name: Hierarchical / multi-agent message
    notes: |
      `core/hierarchical_agents_message.md` baked in via
      `core/src/agents_md.rs:34`.
    paths:
      - codex-rs/core/hierarchical_agents_message.md
      - codex-rs/core/src/agents_md.rs
  - name: Compaction and memories prompts (baked in)
    notes: |
      Auto-compaction and memory stage prompts — these .md files DO get
      include_str! linked from `core/src/compact.rs` and the memory modules.
    paths:
      - codex-rs/core/templates/compact/prompt.md
      - codex-rs/core/templates/compact/summary_prefix.md
      - codex-rs/core/templates/memories/consolidation.md
      - codex-rs/core/templates/memories/read_path.md
      - codex-rs/core/templates/memories/stage_one_input.md
      - codex-rs/core/templates/memories/stage_one_system.md
      - codex-rs/core/src/compact.rs
      - codex-rs/core/src/memories/mod.rs
      - codex-rs/core/src/memories/prompts.rs
  - name: Tool registry, specs, defaults (Rust source — compiled in)
    notes: |
      Rust modules that wire up tool specs, defaults, and code-mode exposure.
      Edits to descriptions or defaults take effect at compile time.
    paths:
      - codex-rs/core/src/tools/spec.rs
      - codex-rs/core/src/tools/registry.rs
      - codex-rs/tools/src/tool_registry_plan.rs
      - codex-rs/tools/src/tool_registry_plan_types.rs
      - codex-rs/tools/src/tool_config.rs
      - codex-rs/tools/src/tool_spec.rs
      - codex-rs/tools/src/tool_definition.rs
      - codex-rs/tools/src/code_mode.rs
      - codex-rs/core/src/tools/code_mode/mod.rs
  - name: Shell / exec / permission-request runtime
    notes: Shell tool schemas, exec-command behavior, permission prompting, runtime handlers.
    paths:
      - codex-rs/tools/src/local_tool.rs
      - codex-rs/core/src/unified_exec/process_manager.rs
      - codex-rs/core/src/tools/handlers/shell.rs
      - codex-rs/core/src/tools/handlers/request_permissions.rs
      - codex-rs/core/src/tools/handlers/unified_exec.rs
  - name: Planning / request-user-input tools
    paths:
      - codex-rs/tools/src/plan_tool.rs
      - codex-rs/tools/src/request_user_input_tool.rs
      - codex-rs/core/src/tools/handlers/plan.rs
      - codex-rs/core/src/tools/handlers/request_user_input.rs
  - name: Multi-agent / batch-agent tools
    paths:
      - codex-rs/tools/src/agent_tool.rs
      - codex-rs/tools/src/agent_job_tool.rs
      - codex-rs/core/src/tools/handlers/multi_agents.rs
      - codex-rs/core/src/tools/handlers/multi_agents_v2.rs
      - codex-rs/core/src/tools/handlers/agent_jobs.rs
  - name: MCP integration
    paths:
      - codex-rs/codex-mcp/src/mcp_connection_manager.rs
      - codex-rs/core/src/mcp_tool_exposure.rs
      - codex-rs/core/src/mcp_tool_approval_templates.rs
      - codex-rs/tools/src/mcp_tool.rs
      - codex-rs/tools/src/mcp_resource_tool.rs
      - codex-rs/core/src/tools/handlers/mcp.rs
      - codex-rs/core/src/tools/handlers/mcp_resource.rs
  - name: Apps / AGENTS.md / user-instruction context injection
    paths:
      - codex-rs/core/src/apps/render.rs
      - codex-rs/core/src/project_doc.rs
      - codex-rs/instructions/src/lib.rs
      - codex-rs/instructions/src/fragment.rs
      - codex-rs/instructions/src/user_instructions.rs
  - name: Realtime / guardian policy
    paths:
      - codex-rs/core/templates/realtime/backend_prompt.md
      - codex-rs/core/src/realtime_prompt.rs
      - codex-rs/core/src/guardian/prompt.rs
