# Agave Solana Validator Fuzz Pipeline
#
# Ported from handsomechaz/fuzz_agave.sh + agent_task_agave.sh
#
# Prerequisites:
#   - Agave debug build (set AGAVE_SOURCE or default: /mnt/lvm_data/agave_debug)
#   - Per-agent workspace trees (set AGAVE_WS_BASE or default: /mnt/lvm_data/agaves)
#   - codex CLI authenticated
#   - Working directory initialized: mkdir -p agave_codex_swarm/{docs,crashes,agents,locks}
#
# Docker note:
#   The original handsomechaz launcher runs agents inside Docker containers
#   (image: agave-dev-localnet) with --cap-add=SYS_PTRACE --cap-add=SYS_NICE
#   --security-opt seccomp=unconfined and a localnet-control.sh script for
#   starting/stopping multi-validator clusters. When running via AgentFlow on a
#   host with the Agave build available directly, set the environment variables
#   below. For Docker-based execution, wrap this pipeline with the appropriate
#   container target configuration.
#
# Usage:
#   agentflow run examples/fuzz/fuzz_agave.yaml --preflight never

name: fuzz-agave
description: 5-agent concurrent Agave Solana validator security testing swarm
working_dir: ./agave_codex_swarm
concurrency: 5

nodes:
  - id: init
    agent: codex
    tools: read_write
    timeout_seconds: 30
    prompt: |
      Create the following directory structure silently (no output needed):
        mkdir -p docs crashes agents/agent_{1,2,3,4,5} locks
      Also create per-agent overlay workspace directories:
        mkdir -p /mnt/lvm_data/agaves/agent_{1,2,3,4,5}/ws
      If crashes/README.md does not exist or is empty, create it with:
        # Agave Security Findings Registry

        | Timestamp | Agent ID | Criterion | Impact | PoC Path |
        |---|---|---|---|---|
      If docs/global_lessons.md does not exist or is empty, create it with:
        # General Agave Lessons
        Reserved for reusable validator/localnet workflow notes.
      Then respond with exactly: INIT_OK

    success_criteria:
      - kind: output_contains
        value: INIT_OK

  - id: agent-1
    agent: codex
    model: gpt-5.3-codex
    tools: read_write
    depends_on: [init]
    timeout_seconds: 7200
    retries: 3
    retry_backoff_seconds: 3
    extra_args:
      - "--search"
      - "-c"
      - 'model_reasoning_effort="xhigh"'
    prompt: |
      You are Agent 1 in a concurrent swarm of 5 security researchers targeting Agave validator/RPC behavior.

      TARGET REPO: /mnt/lvm_data/agave_debug
      AGENT WORKSPACE (use this repo tree): /mnt/lvm_data/agaves/agent_1/ws
      REGISTRY: crashes/README.md
      YOUR SCRATCH DIR: agents/agent_1
      COMPLETION MARKER: agents/agent_1/agent_1.done

      HARD CONSTRAINTS:
      1. You MAY modify code in your own overlay workspace (/mnt/lvm_data/agaves/agent_1/ws) for testing and instrumentation purposes.
      2. You MAY create unit tests, integration tests, and project test binaries when they help validate or falsify a hypothesis.
      3. You MAY start local validator/RPC clusters (including multi-node/full local cluster setups) to validate network-wide impact hypotheses with scripts to interact with them.
      4. If you need funds for sending and confirming transactions, you MAY use the faucet.
      5. Use DEBUG builds only for this campaign (no release/profile-optimized builds for findings validation).
      6. Focus on remotely triggerable security impact from unprivileged actors.
      7. Do not log speculative issues. Double/triple-check hypotheses by confirming with runnable scripts and a reproducible PoC package before writing to crashes/README.md.
      8. Deduplicate against crashes/README.md before adding a new entry.

      IN-SCOPE ACCEPT CRITERIA (must meet at least one):
      1. Network-wide crashability:
         - One unprivileged node/validator can trigger panic/segfault on other validators/RPC nodes (broad peer impact, not single local process instability).
      2. Remote state corruption:
         - One unprivileged node/validator can cause incorrect state transitions, invalid ledger/account state acceptance, or persistent state divergence on other validators/RPC nodes.
      3. Cross-program isolation break:
         - A program can violate runtime/account invariants and mutate state owned by other programs (owner/write boundary violation, CPI privilege misuse, writable-set escape, etc.).
      4. Unauthorized value movement:
         - Unauthorized transaction path can bypass intended authorization/integrity checks and cause potential fund loss.

      REQUIRED TECHNICAL EVIDENCE BEFORE LOGGING:
      - Attacker model: explicitly unprivileged capability (what keys/node role the attacker has and does not have).
      - Trigger surface: protocol message/transaction/program input path.
      - Victim effect: validator/RPC crash propagation, state corruption proof, isolation break proof, or unauthorized balance/state mutation.
      - Invariant violated: exact broken rule (authorization, ownership, atomicity, replay/nonce semantics, account lock/write set, consensus validity, etc.).
      - Repro confidence: repeated confirmation with process/network resets using runnable scripts, plus at least one negative/control variant showing the effect is not flake/noise.
      - Impact statement: concrete worst-case consequence on network availability, integrity, or funds.
      - Build context: exact debug build command/commit/config used for reproduction.

      MANDATORY POC REQUIREMENT (same rigor as V8/Chromium crash logging):
      - Do NOT add an entry to crashes/README.md without a runnable PoC package.
      - For each confirmed finding, create:
        crashes/crash_$(date +%s)_agent1/
        containing at least:
        1) run.sh (single-command reproducer),
        2) README.md (attacker model, prerequisites, exact steps, expected result),
        3) artifacts/ (logs, tx payloads, configs, state diffs, and any scripts used).
      - The PoC must be reproducible by another agent from the package contents and documented commands.
      - If script-backed PoC is incomplete, flaky, hypothesis-only, or non-reproducible, keep investigating and DO NOT log to crashes/README.md.

      OUT OF SCOPE:
      - Local-only crashes without cross-node impact.
      - Privileged-attacker-only scenarios.
      - Pure perf regressions or benign errors without security impact.
      - Findings that only reproduce after semantic behavior changes that are not instrumentation/testing-related.

      WORKFLOW:
      Step 1: Select deep components (consensus/replay, banking stage, account loader/store, runtime/CPI, networking/gossip, RPC state serving).
      Step 2: Review existing docs/ and docs/global_lessons.md to avoid duplicate work.
      Step 3: Build minimal realistic trigger artifacts (tx/program inputs/network messages/scripts).
      Step 4: Validate with the strongest practical method available: direct runtime repro, existing unit/integration tests, and/or local cluster execution.
      Step 5: Validate attacker model, victim scope, and invariant violation.
      Step 6: Confirm reproducibility and rule out flakiness.
      Step 7: Build the mandatory PoC package under crashes/crash_$(date +%s)_agent1/ and re-run it to verify.
      Step 8: If confirmed and deduped, log to crashes/README.md with PoC paths; otherwise document lessons in docs/<short_name>.md.

      REPORT FORMAT FOR crashes/README.md (required fields):
      - Timestamp
      - Agent ID
      - Criterion hit (1/2/3/4)
      - Attacker capability model
      - Affected node roles/count
      - Broken invariant
      - Concrete impact
      - PoC directory path
      - PoC run command
      - Debug build command/config
      - Repro artifact paths
