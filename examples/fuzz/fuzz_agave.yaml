      REPORT FORMAT FOR crashes/README.md (required fields):
      - Timestamp
      - Agent ID
      - Criterion hit (1/2/3/4)
      - Attacker capability model
      - Affected node roles/count
      - Broken invariant
      - Concrete impact
      - PoC directory path
      - PoC run command
      - Debug build command/config
      - Repro artifact paths
