# Chromium Fuzz Pipeline
#
# Ported from handsomechaz/fuzz_chromium.sh + agent_task_chromium.sh
#
# Prerequisites:
#   - ASAN+debug Chromium binary (set CHROMIUM_PATH or default: /mnt/lvm_data/chromium/src/out/asan_dbg_symbols/chrome)
#   - Chromium source tree (set CHROMIUM_SOURCE or default: /mnt/lvm_data/chromium/src)
#   - Helper scripts: chromium_agent_assets/utils.py and chromium_agent_assets/playwright_template.py
#     placed alongside this pipeline or pre-copied into the working directory
#   - codex CLI authenticated
#   - Working directory initialized: mkdir -p chromium_codex_swarm/{docs,crashes,agents,locks}
#
# Usage:
#   agentflow run examples/fuzz/fuzz_chromium.yaml --preflight never

name: fuzz-chromium
description: 5-agent concurrent Chromium vulnerability fuzzing swarm
working_dir: ./chromium_codex_swarm
concurrency: 5

nodes:
  - id: init
    agent: codex
    tools: read_write
    timeout_seconds: 60
    prompt: |
      Create the following directory structure silently (no output needed):
        mkdir -p docs crashes agents/agent_{1,2,3,4,5} locks
      If crashes/README.md does not exist or is empty, create it with:
        # Chromium Crash Registry

        Out of scope: CHECK/DCHECK-only crashes. Do not document CHECK/DCHECK/FATAL assertion-only crashes in this registry.

        | Timestamp | Agent ID | Component | Crash Type | Input HTML | Input PY |
        |---|---|---|---|---|---|
      If docs/global_lessons.md does not exist or is empty, create it with:
        # General Chromium + Playwright Lessons
        Reserved for execution quirks, process model caveats, and reliable trigger patterns.

      For each agent directory agents/agent_{1..5}:
        - If a file chromium_agent_assets/utils.py exists, copy it to agents/agent_N/utils.py
        - If a file chromium_agent_assets/playwright_template.py exists, copy it to agents/agent_N/playwright_template.py
        - If agents/agent_N/input_N.py does not exist, copy playwright_template.py to agents/agent_N/input_N.py

      Then respond with exactly: INIT_OK

    success_criteria:
      - kind: output_contains
        value: INIT_OK

  - id: agent-1
    agent: codex
    model: gpt-5.3-codex
    tools: read_write
    depends_on: [init]
    timeout_seconds: 7200
    retries: 3
    retry_backoff_seconds: 3
    extra_args:
      - "--search"
      - "-c"
      - 'model_reasoning_effort="xhigh"'
    prompt: |
      You are Agent 1 in a concurrent swarm of 5 AI vulnerability researchers fuzzing Chromium.

      Chromium is very well audited and vulnerabilities can only occur very deep in the code. Do not do surface work! You can always enable any stable blink feature (e.g., MachineLearningNeuralNetwork) and use reasonable flags that are going to be used in production / release.

      TARGET BINARY: /mnt/lvm_data/chromium/src/out/asan_dbg_symbols/chrome
      CHROMIUM SOURCE: /mnt/lvm_data/chromium/src
      DEBUGGER: gdb
      YOUR WORKSPACE: agents/agent_1
      YOUR HTML PAYLOAD: agents/agent_1/input_1.html
      YOUR PLAYWRIGHT SCRIPT: agents/agent_1/input_1.py
      HELPER MODULE: agents/agent_1/utils.py
      SCRIPT TEMPLATE: agents/agent_1/playwright_template.py

      STRICT CONSTRAINTS & DEFINITION OF A CRASH:
      1. DO NOT edit the Chromium source code.
      2. DO NOT write, compile, or run C++ unit tests.
      3. FOCUS ONLY ON MEMORY BUGS in the C++ engine (Blink, V8, IPC, Skia, media, etc.). blink/modules/ai is out of scope.
      4. DEFINITION OF A CRASH: A JavaScript exception is NOT A CRASH.
      5. You MUST ONLY log a crash if execution shows one of:
         - AddressSanitizer (ASAN) report
         - UndefinedBehaviorSanitizer (UBSAN) report relevant to memory safety
         - CHECK/DCHECK/FATAL assertion-only crashes are out of scope and MUST NOT be documented.
      6. UBSAN NOISE FILTER: Ignore non-memory UB only reports (pure signed overflow, benign shifts, etc.) unless accompanied by concrete memory corruption symptoms.
      7. MULTI-PROCESS AWARENESS: Chromium is multi-process. Renderer crashes commonly appear as Playwright exceptions while the sanitizer trace appears in stderr.
      8. PROCESS MODEL REQUIREMENT: DO NOT use p.chromium.launch() for the target browser. The script must start Chromium as an external subprocess with a RANDOM CDP port and then connect via Playwright CDP.
      9. REPRO CHECK: Before logging a crash, rerun at least once to confirm reproducibility and collect the clearest stack trace.
      10. GDB USAGE: Because Chromium is externally launched, attach gdb to the launched browser PID or child renderer PID for reachability checks only when necessary. DO NOT use gdb if you don't need it. DO NOT use gdb to debug after crash is confirmed.
      11. USE THE PROVIDED HELPERS: Use agents/agent_1/utils.py and start from agents/agent_1/playwright_template.py. Do NOT re-implement Chromium launch/CDP plumbing unless helper behavior is insufficient.
      12. DO NOT STOP UNTIL 2 TRUE C++ CRASHES ARE FOUND.
      13. DO NOT EXPLORE MODULES ALREADY DOCUMENTED TO BE CRASHING IN crashes/README.md. Human engineers need to fix them first! Even though you may find another way to crash it, it is useless.
      14. OWNERSHIP RULE: If you notice a new crashes/README.md entry (especially one added by another agent), do NOT reproduce it, extend it, or further investigate that crash family. It is not your obligation; move to a different component immediately.
      15. DO NOT read / attempt to read other agents' directory. It is none of your business.
      16. For deduplication, simply DO NOT analyze modules that are already crashing. You can get the module name from crashes/README.md directly. DO NOT read/analyze other agents' work!

      WORKFLOW:
      Step 1: PICK TARGET - Select a random component in /mnt/lvm_data/chromium/src.
      Step 2: GATHER KNOWLEDGE - Read docs/ for existing component notes and docs/global_lessons.md to avoid duplicate effort.
        - While working, re-check crashes/README.md before any repro/logging action. If a matching or newly-added crash family appears, stop that line of work immediately and pick a new target.
      Step 3: EXPLORATION LOOP -
         a. INSPECT: Audit target C++ paths for UAF/OOB/type confusion/lifetime bugs.
         b. GENERATE PAYLOAD: Write an HTML+JS trigger to agents/agent_1/input_1.html.
         c. GENERATE ORCHESTRATOR: Start from agents/agent_1/playwright_template.py and write agents/agent_1/input_1.py using agents/agent_1/utils.py.
            Minimal API to use:
            - from utils import start_browser
            - with start_browser(CHROMIUM_PATH, log_dir=str(AGENT_DIR)) as session:
            - session.open_file(INPUT_HTML)
            - page = session.page
            - session.chrome_pid and session.renderer_pids() for GDB target selection
            The helper already handles: random CDP port, external Chromium launch, Playwright connect_over_cdp, ASAN startup ODR-noise suppression, debugger-attach-friendly process setup, and cleanup.
         d. EXECUTE: Run python3 agents/agent_1/input_1.py 2>&1 and analyze stderr/stdout.
         e. VERIFY: Look only for ASAN or memory-UBSAN signatures. CHECK/DCHECK/FATAL assertion-only crashes and plain segfault/signal traces without sanitizer-backed memory evidence are out of scope and must not be logged. MiraclePtr-protected bugs are out of scope (i.e., for in-scope crashes, you need to see 'MiraclePtr Status: NOT PROTECTED'), unless you can show exploitation of a BRP-protected use-after-free. Ignore plain JS errors or renderer crash or page crash, unless you can escalate to a full browser crash.
         * Repeat until component is exhausted or a TRUE crash is found.
         * It is not your job to analyze the root cause or debug the crash.
      Step 4: DOCUMENT COMPONENT - If no crash, write findings to docs/<short_name>.md using flock -x locks/docs.lock.
      Step 5: LOG GENERAL LESSONS - Append reusable Chromium/Playwright execution lessons to docs/global_lessons.md with flock locking, only if you believe these lessons are important and new and unique.
      Step 6: PICK NEW TARGET - Return to Step 1.

      CRASH HANDLING (ONLY AFTER TRUE CRASH):
      0. Deduplicate: compare against crashes/README.md and skip if it matches an existing crash signature.
      1. Reproduce: From agents/agent_1/input_1.html and agents/agent_1/input_1.py create a python script and a HTML that can steadily reproduce the crash.
      2. Copy the reproducible HTML file to crashes/crash_$(date +%s)_agent1.html
      3. Copy the reproducible Python script to crashes/crash_$(date +%s)_agent1.py
      4. Append a record to crashes/README.md using flock -x locks/crashes.lock, including crash type and top stack frame.
